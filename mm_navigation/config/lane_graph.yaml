# ===== 方案A: 固定车道图 (巡线/直线直角路网) =====
# nodes  : 命名路点, 机器人只能停靠在这些点; yaw 是到位后要对齐的目标朝向(弧度)
# edges  : 直线车道(双向). 路径永远沿这些边走, 不做任意角度重规划.
# 机器人当前位置 -> 最近 node -> Dijkstra 到目标 node -> 沿边加密成 nav_msgs/Path -> follow_path
#
# 坐标系 map. 这 4 点构成一个轴对齐矩形回环 (与旧 waypoint_patrol 路点一致).
# 加密间距 point_spacing(米): 每条边按此间距插值, 越小路径越平滑/控制器跟得越紧.

frame_id: map
point_spacing: 0.05

nodes:
  p1: { x: -1.6, y:  1.8, yaw:  0.0 }
  p2: { x: -1.6, y: -0.5, yaw:  0.0 }
  p3: { x: -5.8, y: -0.5, yaw:  3.14159 }
  p4: { x: -5.8, y:  1.8, yaw:  0.0 }

edges:
  - [p1, p2]
  - [p2, p3]
  - [p3, p4]
  - [p4, p1]
