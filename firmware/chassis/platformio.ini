; PlatformIO Project Configuration File
; ESP32-S3 (N16R8) 底盘驱动固件 — micro-ROS + 原生USB串口

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino

; --- N16R8 PSRAM(OPI) 启用; f_flash=80MHz 必须,缺则 boot loop ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.f_flash = 80000000L

; --- 原生 USB CDC: Serial=USB-OTG(给micro-ROS), Serial0=UART0(GPIO43/44,调试log) ---
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -I include

; --- micro-ROS: gitee ohhuo 镜像(国内源), humble, 串口传输 ---
lib_deps =
    https://gitee.com/ohhuo/micro_ros_platformio.git
board_microros_distro = humble
board_microros_transport = serial

; 调试串口监视(UART0 烧录口); micro-ROS 走原生USB(ttyACM)不在这看
monitor_speed = 115200
